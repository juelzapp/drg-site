  <style>
    .lib{background:var(--paper);padding:calc(76px + clamp(44px,6vw,80px)) 0 clamp(56px,8vw,100px)}
    .lib-top{display:flex;align-items:flex-end;justify-content:space-between;gap:24px;flex-wrap:wrap;margin-bottom:18px}
    .lib-top .eyebrow{color:var(--ink)}
    .lib-top h1{font-family:var(--serif);font-weight:500;font-size:clamp(36px,5vw,58px);line-height:.98;letter-spacing:-.03em;margin-top:14px;color:var(--ink)}
    .lib-filters{display:flex;flex-wrap:wrap;gap:4px 24px;margin:0 0 clamp(30px,4vw,50px);border-bottom:1px solid rgba(92,82,70,.18);padding-bottom:16px}
    .lib-filter{background:none;border:0;padding:6px 0;font-family:var(--sans);font-size:11.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#9a9082;cursor:pointer;position:relative;transition:color .2s}
    .lib-filter:hover{color:var(--ink)}
    .lib-filter.is-active{color:var(--ink)}
    .lib-filter.is-active::after{content:"";position:absolute;left:0;right:0;bottom:-17px;height:2px;background:var(--gold)}
    .lib-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(34px,3.6vw,60px) clamp(22px,2.4vw,38px)}
    .lib-card{display:block;color:inherit;text-decoration:none}
    .lib-thumb{position:relative;aspect-ratio:4/3;overflow:hidden;background:#e6dfd2;margin-bottom:18px}
    .lib-thumb img{width:100%;height:100%;object-fit:cover;transition:transform .6s ease}
    .lib-card:hover .lib-thumb img{transform:scale(1.05)}
    .lib-thumb::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent 60%,rgba(14,14,15,.18));opacity:0;transition:opacity .3s}
    .lib-card:hover .lib-thumb::after{opacity:1}
    .lib-play{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:52px;height:52px;border-radius:50%;background:rgba(14,14,15,.45);border:1px solid rgba(255,255,255,.75);display:grid;place-items:center;color:#fff;font-size:23px;z-index:2}
    .lib-type{font-family:var(--sans);font-size:10px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--gold)}
    .lib-card h3{font-family:var(--serif);font-weight:500;font-size:25px;line-height:1.1;color:var(--ink);margin:9px 0 10px;letter-spacing:-.015em}
    .lib-card p{font-family:var(--sans);font-size:13.5px !important;line-height:1.55;color:#6a6356;margin:0;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .lib-go{display:none}
    @media(max-width:991px){.lib-grid{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:640px){.lib-grid{grid-template-columns:1fr}}
  </style>
</head>
