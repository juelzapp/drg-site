  <style>
    .lib{background:var(--paper);padding:calc(76px + clamp(44px,6vw,80px)) 0 clamp(56px,8vw,100px)}
    .lib-top{margin-bottom:20px}
    .lib-top .eyebrow{color:var(--ink)}
    .lib-top h1{font-family:var(--serif);font-weight:500;font-size:clamp(36px,5vw,58px);line-height:.98;letter-spacing:-.03em;margin-top:14px;color:var(--ink)}
    .lib-filters{display:flex;flex-wrap:wrap;gap:8px;margin:0 0 clamp(30px,4vw,52px)}
    .lib-filter{border:1px solid rgba(92,82,70,.28);border-radius:999px;background:none;padding:6px 15px;font-family:var(--sans);font-size:11px;font-weight:600;letter-spacing:.07em;color:#5c5246;cursor:pointer;transition:all .2s;line-height:1}
    .lib-filter:hover{border-color:var(--ink);color:var(--ink)}
    .lib-filter.is-active{background:var(--gold);border-color:var(--gold);color:#0e0e0f}
    .lib-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(30px,3vw,52px) clamp(22px,2.2vw,34px)}
    .lib-card{display:block;color:inherit;text-decoration:none}
    .lib-thumb{position:relative;aspect-ratio:16/10;overflow:hidden;background:#e6dfd2;margin-bottom:16px}
    .lib-thumb img{width:100%;height:100%;object-fit:cover;transition:transform .5s ease}
    .lib-card:hover .lib-thumb img{transform:scale(1.04)}
    .lib-play{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:48px;height:48px;border-radius:50%;background:rgba(14,14,15,.5);border:1px solid rgba(255,255,255,.7);display:grid;place-items:center;color:#fff;font-size:21px}
    .lib-type{font-family:var(--sans);font-size:10px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--gold)}
    .lib-card h3{font-family:var(--serif);font-weight:500;font-size:23px;line-height:1.12;color:var(--ink);margin:8px 0;letter-spacing:-.01em}
    .lib-card p{font-family:var(--sans);font-size:14px !important;line-height:1.55;color:#565248;margin:0 0 14px}
    .lib-go{font-family:var(--sans);font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--ink);display:inline-flex;align-items:center;gap:8px;transition:color .2s,gap .2s}
    .lib-card:hover .lib-go{color:var(--gold);gap:12px}
    @media(max-width:991px){.lib-grid{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:640px){.lib-grid{grid-template-columns:1fr}}
  </style>
</head>
