  const mediaAssetBase = '../../assets/images/media/';

  function mediaSlug(value) {
    return String(value || '')
      .trim()
      .toLowerCase()
      .replace(/[’']/g, '')
      .replace(/[^a-z0-9]+/g, '-')
      .replace(/^-+|-+$/g, '');
  }

  function escapeHtml(value) {
    return String(value ?? '').replace(/[&<>"']/g, function (char) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[char];
    });
  }

  function renderPodcastPlayer(item) {
    if (item.is_audio) {
      return `
        <div class="podcast-player" data-audio="${escapeHtml(item.link)}">
          <button type="button" class="podcast-play-button" aria-label="Play podcast"><i class="bi bi-play-fill"></i></button>
          <div class="podcast-visualizer" aria-hidden="true">
            <span></span><span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span><span></span>
            <span></span><span></span>
          </div>
          <div class="podcast-time">
            <span class="podcast-current">0:00</span>
            <span class="podcast-duration">0:00</span>
          </div>
          <input class="podcast-progress" type="range" min="0" max="100" value="0" step="0.1" aria-label="Podcast progress">
          <audio preload="metadata" src="${escapeHtml(item.link)}"></audio>
        </div>`;
    }
    return `
      <div class="podcast-player podcast-embed-player" data-embed="${escapeHtml(item.embed || item.link)}" data-media-title="${escapeHtml(item.name)}">
        <button type="button" class="podcast-play-button podcast-embed-trigger" aria-label="Play podcast"><i class="bi bi-play-fill"></i></button>
        <div class="podcast-visualizer" aria-hidden="true">
          <span></span><span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span><span></span>
          <span></span><span></span>
        </div>
        <div class="podcast-time">
          <span>Listen</span>
          <span>Embed</span>
        </div>
        <input class="podcast-progress" type="range" min="0" max="100" value="0" step="0.1" aria-label="Podcast progress" disabled>
      </div>`;
  }

  function renderMediaCards() {
    const tagNav = document.getElementById('mediaTagNav');
    const cards = document.getElementById('mediaGridCards');
    if (!tagNav || !cards) return;

    tagNav.innerHTML = mediaData.tags.map(function (tag) {
      const slug = mediaSlug(tag);
      return `<a href="#${escapeHtml(slug)}" class="media-tag-button" data-media-filter="${escapeHtml(slug)}">${escapeHtml(tag)}</a>`;
    }).join('');

    cards.innerHTML = mediaData.items.map(function (item) {
      const tagSlugs = (item.tags || []).map(mediaSlug).join(' ');
      const tagLabels = (item.tags || []).join('|');
      let card = '';
      if (item.type === 'Articles') {
        card = `
          <article class="articles-card">
            <a class="articles-card-image" target="_blank" href="${escapeHtml(item.link)}" aria-label="${escapeHtml(item.name)}">
              <img src="${mediaAssetBase}${escapeHtml(item.thumb)}" alt="${escapeHtml(item.name)}">
            </a>
            <div class="articles-card-body">
              <h2>${escapeHtml(item.name)}</h2>
              <p>${escapeHtml(item.description)}</p>
              <a class="articles-card-read" target="_blank" href="${escapeHtml(item.link)}">Read Article <i class="bi bi-arrow-right"></i></a>
            </div>
          </article>`;
      } else if (item.type === 'Podcasts') {
        card = `
          <article class="articles-card">
            <div class="articles-card-image podcast-cover" aria-label="${escapeHtml(item.name)}">
              <img src="${mediaAssetBase}${escapeHtml(item.thumb)}" alt="${escapeHtml(item.name)}">
              ${renderPodcastPlayer(item)}
            </div>
            <div class="articles-card-body">
              <h2>${escapeHtml(item.name)}</h2>
              <p>${escapeHtml(item.description)}</p>
            </div>
          </article>`;
      } else if (item.type === 'Videos') {
        card = `
          <article class="articles-card">
            <button type="button" class="articles-card-image video-play-trigger" data-video="${escapeHtml(item.embed)}" data-media-title="${escapeHtml(item.name)}" aria-label="${escapeHtml(item.name)}">
              <img src="${mediaAssetBase}${escapeHtml(item.thumb)}" alt="${escapeHtml(item.name)}">
              <span class="video-play-button"><i class="bi bi-play-fill"></i></span>
            </button>
            <div class="articles-card-body">
              <h2>${escapeHtml(item.name)}</h2>
              <p>${escapeHtml(item.description)}</p>
            </div>
          </article>`;
      }
      return `<div class="col-12 col-md-6 col-xl-6 media-grid-item" data-tags="${escapeHtml(tagSlugs)}" data-tag-labels="${escapeHtml(tagLabels)}">${card}</div>`;
    }).join('');
  }

  renderMediaCards();
</script>
