<!doctype html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--paper:#f5f0e7;--on-dark:#eee8dc;--on-dark-soft:#b9b2a6;--serif:"Cormorant Garamond";--sans:"Inter";--gold:#c4a06e}
*{box-sizing:border-box;margin:0}
body{background:#040506;color:var(--on-dark);font-family:var(--sans);padding:60px 40px}
.wrap{max-width:1240px;margin:0 auto}
.eyebrow{font-size:12px;font-weight:800;letter-spacing:.24em;text-transform:uppercase}
.ulink{font-size:11px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--on-dark);text-decoration:none}
.books-grid{display:grid;grid-template-columns:0.95fr 1.25fr 1.25fr;gap:56px;align-items:center}
.books-intro h2{font-family:var(--serif);font-weight:500;font-size:2.9rem;line-height:1.06;margin:22px 0 26px}
.book{display:grid;grid-template-columns:190px 1fr;gap:30px;align-items:center}
.book .cover{aspect-ratio:2/3;position:relative;display:flex;align-items:center;justify-content:center;background:transparent}
.book .cover img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain}
.book h3{font-family:var(--serif);font-weight:500;font-size:1.95rem;line-height:1.08;color:var(--paper);margin-bottom:16px}
.book p{color:var(--on-dark-soft);font-size:13.5px;line-height:1.6;margin-bottom:20px;max-width:26ch}
</style></head><body>
<div class="wrap books-grid">
  <div class="books-intro"><span class="eyebrow">The Books</span><h2>Ideas that<br>challenge.<br>Truth that<br>transforms.</h2><a href="#" class="ulink">Explore the Books</a></div>
  <article class="book"><div class="cover"><img src="assets/images/home/alphas-book-1.png"></div><div><h3>Alphas<br>Die Early</h3><p>Why the world doesn&rsquo;t need more Alphas.</p><a href="#" class="ulink">View Book</a></div></article>
  <article class="book"><div class="cover"><img src="assets/images/home/imperative-book-1.png"></div><div><h3>The<br>Imperative Habit</h3><p>Learn how to shed old beliefs.</p><a href="#" class="ulink">View Book</a></div></article>
</div>
</body></html>
